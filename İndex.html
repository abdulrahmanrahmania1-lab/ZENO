<body>
<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="modal" id="modal">
  <div class="mcard">
    <div style="font-size:38px;text-align:center;margin-bottom:10px">🔑</div>
    <h2>ZENO را فعال کن</h2>
    <p>API Key رایگان Gemini رو از<br><strong style="color:#a78bfa">aistudio.google.com</strong><br>بگیر و اینجا وارد کن</p>
    <input type="password" class="mi" id="apiInput" placeholder="AIza..." />
    <button class="mb" onclick="saveKey()">✨ شروع کن</button>
  </div>
</div>

<div class="main">
  <div class="header">
    <div class="logo">ZENO</div>
    <button class="api-btn" onclick="openModal()">⚙️</button>
  </div>

  <div class="center">
    <div class="orb-wrap" id="ow">
      <div class="ring ring1"></div>
      <div class="ring ring2"></div>
      <div class="ring ring3"></div>
      <button class="voice-btn" id="vb" onclick="toggle()">
        <div class="vbi">
          <span class="mic" id="mic">🎙️</span>
          <span class="vlabel" id="vlb">بگو</span>
        </div>
      </button>
    </div>

    <div class="waves" id="waves">
      <div class="wb"></div><div class="wb"></div><div class="wb"></div>
      <div class="wb"></div><div class="wb"></div><div class="wb"></div>
      <div class="wb"></div>
    </div>

    <div class="status" id="st">برای صحبت دکمه رو بفشار 👆</div>

    <div class="transcript" id="tr">
      <span class="ph">گفتگوی تو اینجا نمایش داده میشه ✨</span>
    </div>

    <div class="chips">
      <div class="chip" onclick="go('درس امروزم رو آماده کن')">📚 درس امروز</div>
      <div class="chip" onclick="go('ترجمه کن')">🌐 ترجمه</div>
      <div class="chip" onclick="go('Bugün ders ver')">🎯 Ders</div>
      <div class="chip" onclick="go('یه متن بنویس')">✍️ متن</div>
      <div class="chip" onclick="go('سوال دارم')">❓ سوال</div>
    </div>
  </div>

  <div class="bottom">
    <div class="tiw">
      <textarea id="inp" placeholder="یا تایپ کن..." rows="1"
        onkeydown="hk(event)" oninput="ar(this)"></textarea>
    </div>
    <button class="sbtn" id="sb" onclick="fromInput()">➤</button>
  </div>
</div>

<script>
let key = localStorage.getItem('zeno') || '';
let hist = [], listening = false, speaking = false, busy = false, rec = null;
const sy = window.speechSynthesis;

const SYS = `تو ZENO هستی — دستیار هوشمند شخصی، حرفه‌ای، جذاب و پرانرژی.
هم فارسی هم ترکی بلدی. به زبان کاربر جواب بده.
جواب‌هات: کوتاه (۲-۳ جمله)، واضح، پرانرژی، با ایموجی.
معلم خصوصی هستی: درس بده، توضیح بده، ترجمه کن، متن بنویس.`;

if (key) document.getElementById('modal').style.display = 'none';

function saveKey() {
  const k = document.getElementById('apiInput').value.trim();
  if (!k) return;
  key = k; localStorage.setItem('zeno', k);
  document.getElementById('modal').style.display = 'none';
}
function openModal() {
  document.getElementById('apiInput').value = key;
  document.getElementById('modal').style.display = 'flex';
}

function toggle() {
  if (!key) { openModal(); return; }
  if (speaking) { sy.cancel(); setSt('idle'); return; }
  if (listening) { stopListen(); return; }
  startListen();
}

function startListen() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setTr('متأسفم، مرورگرت میکروفون پشتیبانی نمی‌کنه. از تایپ استفاده کن ⌨️', ''); return; }
  rec = new SR();
  rec.lang = 'fa-IR'; rec.interimResults = true; rec.continuous = false;
  rec.onstart = () => { listening = true; setSt('listening'); setTr('🎙️ گوش میدم...', 'ut'); };
  rec.onresult = e => {
    let f = '', im = '';
    for (let i = e.resultIndex; i < e.results.length; i++)
      e.results[i].isFinal ? f += e.results[i][0].transcript : im += e.results[i][0].transcript;
    setTr(f || im, 'ut');
    if (f) { stopListen(); go(f); }
  };
  rec.onerror = rec.onend = () => stopListen();
  rec.start();
  document.getElementById('vb').classList.add('listening');
  document.getElementById('ow').classList.add('listening');
  const w = document.getElementById('waves');
  w.classList.add('active','listening'); w.classList.remove('speaking');
  document.getElementById('mic').textContent = '🔴';
  document.getElementById('vlb').textContent = 'توقف';
}

function stopListen() {
  listening = false;
  try { rec?.stop(); } catch(e) {}
  document.getElementById('vb').classList.remove('listening');
  document.getElementById('ow').classList.remove('listening');
  const w = document.getElementById('waves');
  w.classList.remove('active','listening');
  document.getElementById('mic').textContent = '🎙️';
  document.getElementById('vlb').textContent = 'بگو';
  setSt('idle');
}

function setSt(s) {
  const el = document.getElementById('st');
  el.className = 'status';
  const map = { listening:['🎙️ گوش میدم...','on'], thinking:['🧠 دارم فکر می‌کنم...','on'], speaking:['🔊 دارم جواب میدم...','sp'], idle:['برای صحبت دکمه رو بفشار 👆',''] };
  const [t, c] = map[s] || map.idle;
  el.textContent = t; if (c) el.classList.add(c);
  speaking = s === 'speaking';
  const vb = document.getElementById('vb'), ow = document.getElementById('ow'), waves = document.getElementById('waves');
  if (s === 'speaking') {
    vb.classList.add('speaking'); ow.classList.add('speaking');
    waves.classList.add('active','speaking'); waves.classList.remove('listening');
    document.getElementById('mic').textContent = '🔊';
    document.getElementById('vlb').textContent = 'توقف';
  } else if (s !== 'listening') {
    vb.classList.remove('speaking'); ow.classList.remove('speaking');
    waves.classList.remove('active','speaking');
    if (s === 'idle') { document.getElementById('mic').textContent = '🎙️'; document.getElementById('vlb').textContent = 'بگو'; }
  }
}

function setTr(t, c) {
  const el = document.getElementById('tr');
  el.className = 'transcript ' + c;
  el.textContent = t;
}

async function go(text) {
  if (!text || busy) return;
  if (!key) { openModal(); return; }
  busy = true; document.getElementById('sb').disabled = true;
  setSt('thinking'); setTr('💭 ' + text, 'ut');
  hist.push({ role:'user', parts:[{text}] });
  try {
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ system_instruction:{parts:[{text:SYS}]}, contents:hist })
    });
    const d = await r.json();
    if (d.error) { setTr('❌ ' + d.error.message, ''); setSt('idle'); return; }
    const rep = d.candidates?.[0]?.content?.parts?.[0]?.text || 'جواب نگرفتم';
    hist.push({ role:'model', parts:[{text:rep}] });
    if (hist.length > 16) hist = hist.slice(-16);
    setTr(rep, 'at');
    speak(rep);
  } catch(e) { setTr('❌ اینترنت رو چک کن', ''); setSt('idle'); }
  finally { busy = false; document.getElementById('sb').disabled = false; }
}

function speak(text) {
  sy.cancel();
  const clean = text.replace(/[\u{1F300}-\u{1FFFF}]/gu,'').replace(/[^\u0600-\u06FF\u0020-\u007E\u00A0-\u00FF\n]/g,'').trim();
  const u = new SpeechSynthesisUtterance(clean);
  const vs = sy.getVoices();
  u.voice = vs.find(v=>v.lang.startsWith('fa')) || vs.find(v=>v.lang.startsWith('tr')) || vs.find(v=>v.lang.startsWith('ar')) || null;
  u.rate = 0.92; u.pitch = 1.05;
  u.onstart = () => setSt('speaking');
  u.onend = u.onerror = () => setSt('idle');
  sy.speak(u);
}

function fromInput() {
  const inp = document.getElementById('inp');
  const t = inp.value.trim(); if (!t) return;
  inp.value = ''; inp.style.height = 'auto'; go(t);
}
function hk(e) { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); fromInput(); } }
function ar(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,90)+'px'; }
if (sy) sy.onvoiceschanged = () => sy.getVoices();
</script>
